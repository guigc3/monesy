<!doctype html>
<html lang="pt-BR">
<head>
<meta charset="utf-8" />
<link rel="stylesheet" href="../colors_and_type.css" />
<style>
  html, body { margin: 0; padding: 0; background: var(--paper); }
  body { padding: 16px; }
  .frame { width: 700px; box-sizing: border-box; }
  .month-tabs {
    display: grid;
    grid-template-columns: repeat(12, 1fr);
    gap: 3px;
    background: var(--cream);
    padding: 4px;
    border-radius: 12px;
    border: 1px solid var(--line);
  }
  .month-tab-cell { display: flex; flex-direction: column; align-items: center; gap: 3px; }
  .month-tab {
    width: 100%;
    border: none;
    background: transparent;
    border-radius: 8px;
    padding: 9px 0;
    font-family: var(--font-sans);
    font-size: 11.5px;
    font-weight: 600;
    color: var(--text-muted);
    cursor: pointer;
    letter-spacing: -0.01em;
  }
  .month-tab.active {
    background: linear-gradient(135deg, var(--petrol) 0%, var(--petrol-deep) 100%);
    color: var(--cream);
    box-shadow: 0 2px 8px rgba(0,172,193,0.28);
  }
  .month-tab.revisado-not-active {
    background: rgba(0,172,193,0.08);
    color: var(--petrol-deep);
  }
  .month-revisado-cb {
    width: 11px; height: 11px;
    accent-color: var(--green);
    margin: 0;
  }
</style>
</head>
<body>
<div class="frame">
  <div class="month-tabs">
    <div class="month-tab-cell"><button class="month-tab revisado-not-active">Jan</button><input type="checkbox" class="month-revisado-cb" checked /></div>
    <div class="month-tab-cell"><button class="month-tab revisado-not-active">Fev</button><input type="checkbox" class="month-revisado-cb" checked /></div>
    <div class="month-tab-cell"><button class="month-tab revisado-not-active">Mar</button><input type="checkbox" class="month-revisado-cb" checked /></div>
    <div class="month-tab-cell"><button class="month-tab revisado-not-active">Abr</button><input type="checkbox" class="month-revisado-cb" checked /></div>
    <div class="month-tab-cell"><button class="month-tab active">Mai</button><input type="checkbox" class="month-revisado-cb" /></div>
    <div class="month-tab-cell"><button class="month-tab">Jun</button><input type="checkbox" class="month-revisado-cb" /></div>
    <div class="month-tab-cell"><button class="month-tab">Jul</button><input type="checkbox" class="month-revisado-cb" /></div>
    <div class="month-tab-cell"><button class="month-tab">Ago</button><input type="checkbox" class="month-revisado-cb" /></div>
    <div class="month-tab-cell"><button class="month-tab">Set</button><input type="checkbox" class="month-revisado-cb" /></div>
    <div class="month-tab-cell"><button class="month-tab">Out</button><input type="checkbox" class="month-revisado-cb" /></div>
    <div class="month-tab-cell"><button class="month-tab">Nov</button><input type="checkbox" class="month-revisado-cb" /></div>
    <div class="month-tab-cell"><button class="month-tab">Dez</button><input type="checkbox" class="month-revisado-cb" /></div>
  </div>
</div>
</body>
</html>
