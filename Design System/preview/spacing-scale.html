<!doctype html>
<html lang="pt-BR">
<head>
<meta charset="utf-8" />
<link rel="stylesheet" href="../colors_and_type.css" />
<style>
  html, body { margin: 0; padding: 0; background: var(--paper); }
  body { padding: 24px; }
  .card-frame { width: 700px; box-sizing: border-box; }
  .row { display: flex; align-items: end; gap: 18px; }
  .col { display: flex; flex-direction: column; align-items: center; gap: 6px; }
  .bar { background: var(--petrol-soft, rgba(0,172,193,0.18)); border: 1px solid rgba(0,172,193,0.32); border-radius: 4px; height: 32px; }
  .num { font-family: var(--font-mono); font-size: 10px; color: var(--gray); letter-spacing: 0.06em; }
  .name { font-family: var(--font-mono); font-size: 9px; color: var(--ink); letter-spacing: 0.10em; text-transform: uppercase; }
</style>
</head>
<body>
<div class="card-frame">
  <div class="row">
    <div class="col"><div class="bar" style="width:4px"></div><div class="name">space-1</div><div class="num">4 px</div></div>
    <div class="col"><div class="bar" style="width:8px"></div><div class="name">space-2</div><div class="num">8 px</div></div>
    <div class="col"><div class="bar" style="width:12px"></div><div class="name">space-3</div><div class="num">12 px</div></div>
    <div class="col"><div class="bar" style="width:16px"></div><div class="name">space-4</div><div class="num">16 px</div></div>
    <div class="col"><div class="bar" style="width:20px"></div><div class="name">space-5</div><div class="num">20 px</div></div>
    <div class="col"><div class="bar" style="width:24px"></div><div class="name">space-6</div><div class="num">24 px</div></div>
    <div class="col"><div class="bar" style="width:32px"></div><div class="name">space-8</div><div class="num">32 px</div></div>
    <div class="col"><div class="bar" style="width:48px"></div><div class="name">space-12</div><div class="num">48 px</div></div>
  </div>
</div>
</body>
</html>
