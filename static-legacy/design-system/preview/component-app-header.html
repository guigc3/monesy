<!doctype html>
<html lang="pt-BR">
<head>
<meta charset="utf-8" />
<link rel="stylesheet" href="../colors_and_type.css" />
<style>
  html, body { margin: 0; padding: 0; background: var(--paper); }
  body { padding: 0; }
  .frame { width: 700px; box-sizing: border-box; }
  .header {
    background: linear-gradient(135deg, var(--petrol) 0%, var(--petrol-deep) 100%);
    color: var(--cream);
    padding: 16px 22px;
    display: flex;
    justify-content: space-between;
    align-items: center;
    gap: 16px;
  }
  .header-left { display: flex; align-items: center; gap: 12px; }
  .logo-mark {
    width: 40px; height: 40px;
    border-radius: 12px;
    background: rgba(242,243,245,0.12);
    display: grid; place-items: center;
  }
  .header h1 {
    margin: 0;
    font-size: 14px;
    font-weight: 700;
    color: var(--cream);
    letter-spacing: -0.03em;
  }
  .subtitle {
    color: rgba(242,243,245,0.65);
    font-size: 11px;
    font-weight: 400;
  }
  .header-actions { display: flex; gap: 6px; align-items: center; }
  .btn-ghost {
    background: rgba(242,243,245,0.10);
    color: rgba(242,243,245,0.88);
    border: 1px solid rgba(242,243,245,0.18);
    padding: 6px 11px;
    font-size: 11.5px;
    font-weight: 600;
    border-radius: 10px;
    font-family: var(--font-sans);
  }
  .btn-primary-on-dark {
    background: var(--cream);
    color: var(--petrol-deep);
    padding: 6px 12px;
    font-size: 12px;
    font-weight: 700;
    border-radius: 10px;
    font-family: var(--font-sans);
  }
  .app-tabs {
    display: flex;
    gap: 4px;
    padding: 0 22px;
    border-bottom: 1px solid var(--line);
    background: var(--paper);
  }
  .app-tab {
    border: none;
    border-bottom: 2px solid transparent;
    background: transparent;
    color: var(--text-muted);
    padding: 12px 16px 14px;
    font-family: var(--font-sans);
    font-size: 12.5px;
    font-weight: 600;
    margin-bottom: -1px;
  }
  .app-tab.active {
    color: var(--petrol-deep);
    background: var(--cream);
    border-bottom-color: var(--petrol);
  }
</style>
</head>
<body>
<div class="frame">
  <header class="header">
    <div class="header-left">
      <span class="logo-mark">
        <svg viewBox="0 0 100 100" width="26" height="26">
          <rect x="14" y="22" width="16" height="56" rx="6" fill="#F2F3F5"/>
          <rect x="70" y="22" width="16" height="56" rx="6" fill="#F2F3F5"/>
          <path d="M 30 70 L 50 38 L 70 70 L 62 70 L 50 52 L 38 70 Z" fill="#D4AF37"/>
        </svg>
      </span>
      <div>
        <h1>Monesy</h1>
        <div class="subtitle">Receitas, despesas e saldo mensal</div>
      </div>
    </div>
    <div class="header-actions">
      <button class="btn-ghost">⬆ Importar</button>
      <button class="btn-ghost">🗑 Lixeira</button>
      <button class="btn-primary-on-dark">+ Novo lançamento</button>
    </div>
  </header>
  <nav class="app-tabs">
    <button class="app-tab active">Gastos mensais</button>
    <button class="app-tab">Assinaturas</button>
    <button class="app-tab">Features</button>
  </nav>
</div>
</body>
</html>
