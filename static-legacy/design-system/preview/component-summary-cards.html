<!doctype html>
<html lang="pt-BR">
<head>
<meta charset="utf-8" />
<link rel="stylesheet" href="../colors_and_type.css" />
<style>
  html, body { margin: 0; padding: 0; background: var(--cream); }
  body { padding: 20px; }
  .frame { width: 700px; box-sizing: border-box; display: grid; grid-template-columns: repeat(3, 1fr); gap: 12px; }
  .card {
    position: relative;
    background: var(--paper);
    border: 1px solid var(--line);
    border-radius: 12px;
    padding: 18px 20px;
    overflow: hidden;
  }
  .card::before {
    content: '';
    position: absolute; top: 0; left: 0; right: 0;
    height: 3px;
  }
  .card-entrada { background: linear-gradient(160deg, rgba(22,163,74,0.06) 0%, var(--paper) 55%); }
  .card-entrada::before { background: linear-gradient(90deg, var(--petrol), #66D4E3); }
  .card-saida   { background: linear-gradient(160deg, rgba(220,38,38,0.06) 0%, var(--paper) 55%); }
  .card-saida::before { background: linear-gradient(90deg, var(--red), #fca5a5); }
  .card-caixa   { background: linear-gradient(160deg, rgba(0,172,193,0.08) 0%, var(--paper) 55%); }
  .card-caixa::before { background: linear-gradient(90deg, var(--petrol), #66D4E3); }
  .card-pendente { background: linear-gradient(160deg, rgba(212,175,55,0.12) 0%, var(--paper) 55%); }
  .card-pendente::before { background: linear-gradient(90deg, var(--gold), #E8CC6A); }
  .card-orcamento { background: linear-gradient(160deg, rgba(0,106,117,0.08) 0%, var(--paper) 55%); }
  .card-orcamento::before { background: linear-gradient(90deg, var(--petrol-deep), var(--petrol)); }
  .card-liquido  { background: linear-gradient(160deg, rgba(212,175,55,0.10) 0%, var(--paper) 55%); }
  .card-liquido::before { background: linear-gradient(90deg, var(--gold-deep), var(--gold)); }

  .label {
    font-family: var(--font-mono); font-size: 10px; font-weight: 700;
    letter-spacing: 0.10em; text-transform: uppercase; color: var(--gray);
    margin-bottom: 8px; display: block;
  }
  .value {
    font-family: var(--font-mono); font-size: 22px; font-weight: 600;
    letter-spacing: -0.02em; color: var(--ink);
    display: block;
  }
  .hint {
    display: block;
    font-size: 11px;
    color: var(--text-faint);
    margin: -4px 0 6px;
    line-height: 1.3;
  }
</style>
</head>
<body>
<div class="frame">
  <div class="card card-entrada"><span class="label">Entrada</span><strong class="value">R$ 5.840,00</strong></div>
  <div class="card card-saida"><span class="label">Saída total</span><strong class="value">R$ 3.214,52</strong></div>
  <div class="card card-caixa"><span class="label">Caixa disponível</span><span class="hint">Entrada − investido − pagos</span><strong class="value">R$ 1.928,06</strong></div>
  <div class="card card-pendente"><span class="label">A pagar</span><strong class="value">R$ 412,00</strong></div>
  <div class="card card-orcamento"><span class="label">Orçamento</span><span class="hint">Entrada − saída</span><strong class="value">R$ 2.625,48</strong></div>
  <div class="card card-liquido"><span class="label">Líquido anual</span><strong class="value">R$ 22.480,00</strong></div>
</div>
</body>
</html>
