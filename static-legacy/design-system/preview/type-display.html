<!doctype html>
<html lang="pt-BR">
<head>
<meta charset="utf-8" />
<link rel="stylesheet" href="../colors_and_type.css" />
<style>
  html, body { margin: 0; padding: 0; background: var(--paper); }
  body { padding: 24px; }
  .card-frame { width: 700px; box-sizing: border-box; }
  .display {
    font-family: var(--font-sans);
    font-weight: 700;
    font-size: 86px;
    line-height: 0.92;
    letter-spacing: -0.045em;
    color: var(--ink);
    margin: 0;
  }
  .display .accent { color: var(--petrol); }
  .meta {
    margin-top: 10px;
    display: flex; gap: 14px;
    font-family: var(--font-mono);
    font-size: 10px;
    color: var(--gray);
    text-transform: uppercase;
    letter-spacing: 0.10em;
  }
</style>
</head>
<body>
<div class="card-frame">
  <h1 class="display">Estabilidade<br/><span class="accent">nórdica.</span></h1>
  <div class="meta">
    <span>Alte Haas Grotesk · Bold</span>
    <span>86px / 0.92</span>
    <span>tracking −4.5%</span>
  </div>
</div>
</body>
</html>
