<!doctype html>
<html lang="pt-BR">
<head>
<meta charset="utf-8" />
<link rel="stylesheet" href="../colors_and_type.css" />
<style>
  html, body { margin: 0; padding: 0; background: var(--paper); }
  body { padding: 24px; }
  .frame { width: 700px; box-sizing: border-box; display: flex; flex-direction: column; gap: 14px; }
  .row { display: flex; gap: 10px; align-items: center; flex-wrap: wrap; }
  .btn {
    border: none;
    border-radius: 10px;
    padding: 9px 16px;
    font-family: var(--font-sans);
    font-size: 13px;
    font-weight: 600;
    cursor: pointer;
    letter-spacing: 0.01em;
    display: inline-flex; align-items: center; gap: 5px;
  }
  .btn-primary {
    background: linear-gradient(135deg, var(--petrol) 0%, var(--petrol-deep) 100%);
    color: var(--cream);
    box-shadow: 0 2px 8px rgba(0,172,193,0.28);
  }
  .btn-secondary {
    background: var(--cream);
    border: 1px solid var(--line);
    color: var(--text-secondary);
  }
  .btn-ghost {
    background: transparent;
    color: var(--petrol-deep);
    font-weight: 700;
  }
  .btn-danger-solid {
    background: var(--red);
    color: #fff;
    font-weight: 700;
    box-shadow: 0 2px 8px rgba(220,38,38,0.25);
  }
  .btn-sm { padding: 5px 10px; font-size: 12px; }
  .label { font-family: var(--font-mono); font-size: 10px; color: var(--gray); letter-spacing: 0.10em; text-transform: uppercase; min-width: 90px; }
</style>
</head>
<body>
<div class="frame">
  <div class="row">
    <span class="label">Primary</span>
    <button class="btn btn-primary">+ Novo lançamento</button>
    <button class="btn btn-primary btn-sm">Salvar</button>
  </div>
  <div class="row">
    <span class="label">Secondary</span>
    <button class="btn btn-secondary">Cancelar</button>
    <button class="btn btn-secondary btn-sm">Fechar</button>
  </div>
  <div class="row">
    <span class="label">Ghost</span>
    <button class="btn btn-ghost">🗑 Lixeira</button>
    <button class="btn btn-ghost btn-sm">Adicionar</button>
  </div>
  <div class="row">
    <span class="label">Danger</span>
    <button class="btn btn-danger-solid">Excluir</button>
  </div>
</div>
</body>
</html>
