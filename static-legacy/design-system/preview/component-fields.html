<!doctype html>
<html lang="pt-BR">
<head>
<meta charset="utf-8" />
<link rel="stylesheet" href="../colors_and_type.css" />
<style>
  html, body { margin: 0; padding: 0; background: var(--paper); }
  body { padding: 20px; }
  .frame { width: 700px; box-sizing: border-box; display: grid; grid-template-columns: 1fr 1fr; gap: 14px; }
  label.field {
    display: grid; gap: 6px;
    font-family: var(--font-mono);
    font-size: 11px;
    font-weight: 500;
    letter-spacing: 0.10em;
    text-transform: uppercase;
    color: var(--petrol-deep);
  }
  label.field input, label.field select {
    font-family: var(--font-sans);
    font-size: 14px;
    font-weight: 400;
    color: var(--ink);
    border: 1px solid var(--line);
    border-radius: 10px;
    padding: 10px 12px;
    background: var(--cream);
    outline: none;
    text-transform: none;
    letter-spacing: normal;
  }
  label.field input.focus,
  label.field select.focus {
    border-color: var(--petrol);
    background: var(--paper);
    box-shadow: 0 0 0 3px rgba(0,172,193,0.28);
  }
  .tag-input {
    display: flex; flex-wrap: wrap; gap: 6px; align-items: center;
    border: 1px solid var(--line);
    border-radius: 10px;
    padding: 6px 10px;
    background: var(--cream);
    min-height: 44px;
  }
  .tag-chip {
    display: inline-flex; align-items: center; gap: 4px;
    background: rgba(0,172,193,0.10);
    color: var(--petrol-deep);
    border: 1px solid rgba(0,172,193,0.25);
    border-radius: 999px;
    padding: 2px 9px;
    font-family: var(--font-mono);
    font-size: 11px;
    font-weight: 600;
    letter-spacing: 0.02em;
  }
  .tag-remove { color: var(--text-faint); cursor: pointer; }
  .tag-input input {
    border: none; outline: none;
    flex: 1; min-width: 100px;
    padding: 4px 2px;
    background: transparent;
    font: inherit; font-size: 13px;
    color: var(--ink);
  }
</style>
</head>
<body>
<div class="frame">
  <label class="field">
    Descrição
    <input value="Mercado · feira semanal" />
  </label>
  <label class="field">
    Valor (R$)
    <input class="focus" type="number" value="89.40" />
  </label>
  <label class="field" style="grid-column: 1 / span 2;">
    Tags
    <div class="tag-input">
      <span class="tag-chip">fixo <span class="tag-remove">×</span></span>
      <span class="tag-chip">mercado <span class="tag-remove">×</span></span>
      <span class="tag-chip">cartão-itau <span class="tag-remove">×</span></span>
      <input placeholder="Digite e pressione Enter" />
    </div>
  </label>
</div>
</body>
</html>
